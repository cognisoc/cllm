site_name: CLLM
site_description: A bare-metal C unikernel for serving large language models
site_url: https://cognisoc.github.io/cllm
repo_url: https://github.com/cognisoc/cllm
repo_name: cognisoc/cllm

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - Overview: architecture/overview.md
    - Target Platform: architecture/target.md
    - GPU Backend: architecture/gpu-backend.md
  - Design:
    - HTTP Server: design/http-server.md
    - llama.cpp Integration: design/llama-integration.md
  - Specification: specification.md
